spring.application.name=placement-backend

# MongoDB Config - use environment variable
spring.data.mongodb.uri=${MONGO_URI}

# Prevent Spring Boot from crashing on startup if MongoDB is unreachable
spring.data.mongodb.auto-index-creation=false
management.health.mongo.enabled=false

# Server Port Config
server.port=${PORT:8080}

# JWT Config
jwt.secret=${JWT_SECRET:PlaceIQ2026SuperSecretKeyForJWTTokenGenerationMustBe256BitsLong!}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging
logging.level.org.springframework.data.mongodb=ERROR
logging.level.com.placeiq=DEBUG

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.packages-to-scan=com.placeiq.api
