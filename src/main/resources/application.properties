spring.application.name=placement-backend

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/placeiq
spring.data.mongodb.database=placeiq

# Server
server.port=8080

# JWT Secret (change in production!)
jwt.secret=PlaceIQ2026SuperSecretKeyForJWTTokenGenerationMustBe256BitsLong!
jwt.expiration=86400000

# Logging
logging.level.org.springframework.data.mongodb=INFO
logging.level.com.placeiq=DEBUG

# Swagger / SpringDoc OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.tryItOutEnabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true
springdoc.packages-to-scan=com.placeiq.api
